<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>附近羽毛球场动态地图</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title-group">
        <h1>附近羽毛球场动态地图</h1>
        <p>自动收集附近场馆，并动态刷新营业与预约热度</p>
      </div>
      <div class="actions">
        <button id="locateBtn" type="button">定位到我的位置</button>
        <button id="refreshBtn" type="button">立即刷新</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="card">
          <h2>筛选</h2>
          <label class="field">
            高德 JS 地图 Key
            <div class="row">
              <input id="mapKeyInput" type="text" placeholder="仅用于前端底图渲染" />
              <button id="saveMapKeyBtn" type="button">保存</button>
            </div>
          </label>
          <label class="field">
            高德 SecurityJsCode（可选但推荐）
            <input id="securityCodeInput" type="text" placeholder="高德控制台安全密钥，建议填写" />
          </label>
          <label class="field">
            搜索半径
            <div class="row">
              <input id="radiusInput" type="range" min="1000" max="10000" step="500" value="3000" />
              <span id="radiusText">3.0 km</span>
            </div>
          </label>
          <label class="field">
            <input id="favoritesOnly" type="checkbox" />
            只看已收藏
          </label>
          <p class="hint">说明：前端地图使用高德 JS SDK，场馆数据优先通过后端代理获取，营业与预约状态按分钟动态刷新。</p>
        </section>

        <section class="card">
          <h2>场馆列表</h2>
          <div id="loadingText" class="status">正在加载附近羽毛球场...</div>
          <ul id="courtList" class="court-list"></ul>
        </section>
      </aside>

      <section class="map-wrap card">
        <div id="map" aria-label="羽毛球场地图"></div>
      </section>
    </main>

    <template id="courtItemTemplate">
      <li class="court-item">
        <button type="button" class="favorite-btn" title="收藏">☆</button>
        <div class="court-info">
          <h3 class="court-name"></h3>
          <p class="court-meta"></p>
          <p class="court-status"></p>
        </div>
        <div class="court-actions">
          <button type="button" class="focus-btn">地图定位</button>
          <button type="button" class="navigate-btn">导航</button>
        </div>
      </li>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
